<script>
function startSession() {
  document.getElementById("chat").classList.remove("hidden");
  document.getElementById("inputArea").classList.remove("hidden");
  document.getElementById("endBtn").classList.remove("hidden");
}

function addMessage(sender, text) {
  const chat = document.getElementById("chat");
  chat.innerHTML += `<div class="mb-2"><b>${sender}:</b> ${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value;
  if (!text) return;

  addMessage("You", text);
  input.value = "";

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await response.json();
    addMessage("Patient", data.reply);

  } catch (error) {
    addMessage("Error", "Something went wrong");
  }
}

async function endSession() {
  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: "END SESSION" })
    });

    const data = await response.json();
    addMessage("Feedback", data.reply);

  } catch (error) {
    addMessage("Error", "Could not get feedback");
  }
}
</script>
