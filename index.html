<!DOCTYPE html>
<html>
<head>
  <title>AI Counseling Simulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="body" class="flex flex-col items-center min-h-screen bg-cover bg-center relative"
style="background-image: url('https://images.unsplash.com/photo-1588776814546-ec7e6d5a6d65');">

<!-- DARK OVERLAY -->
<div class="absolute inset-0 bg-black bg-opacity-50"></div>

<h1 class="text-3xl font-bold mt-6 text-white z-10">
  AI Counseling Training Simulator
</h1>

<!-- CASE SELECT -->
<div class="z-10 mt-4 flex gap-2">
  <select id="caseSelect" class="p-2 rounded">
    <option value="anxiety">Anxiety</option>
    <option value="depression">Depression</option>
    <option value="relationship">Relationship</option>
  </select>

  <button onclick="startSession()" class="bg-blue-500 text-white px-4 py-2 rounded-xl">
    Start Session
  </button>
</div>

<!-- CHAT AREA (NO BOX, FLOATING) -->
<div id="chat" class="hidden flex flex-col gap-3 w-full max-w-2xl mt-6 px-4 z-10 overflow-y-auto"
style="height: 60vh;">
</div>

<!-- INPUT AREA (FIXED BOTTOM) -->
<div id="inputArea" class="hidden fixed bottom-0 w-full max-w-2xl flex gap-2 p-4 z-10 backdrop-blur-md bg-white/20 rounded-t-2xl">
  <input id="userInput" class="flex-1 p-3 rounded-full border-none outline-none" placeholder="Type your response..." />
  <button onclick="sendMessage()" class="bg-green-500 text-white px-5 rounded-full">
    Send
  </button>
</div>

<button id="endBtn" onclick="endSession()" class="hidden mb-24 mt-4 bg-red-500 text-white px-4 py-2 rounded z-10">
  End Session & Get Feedback
</button>

<script>

// 🎨 BACKGROUND SWITCH
function setBackground(caseType) {
  const body = document.getElementById("body");

  let imageUrl = "";

  if (caseType === "anxiety") {
    imageUrl = "https://images.unsplash.com/photo-1506126613408-eca07ce68773";
  } else if (caseType === "depression") {
    imageUrl = "https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d";
  } else if (caseType === "relationship") {
    imageUrl = "https://images.unsplash.com/photo-1511988617509-a57c8a288659";
  } else {
    imageUrl = "https://images.unsplash.com/photo-1588776814546-ec7e6d5a6d65";
  }

  body.style.backgroundImage = `url(${imageUrl})`;
}

// ▶ START SESSION
function startSession() {
  const selectedCase = document.getElementById("caseSelect").value;

  setBackground(selectedCase);

  document.getElementById("chat").classList.remove("hidden");
  document.getElementById("inputArea").classList.remove("hidden");
  document.getElementById("endBtn").classList.remove("hidden");
}

// 💬 SEND MESSAGE
async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value;

  if (!text) return;

  addMessage("You", text);
  input.value = "";

  const response = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await response.json();

  addMessage("Patient", data.reply);
}

// 🛑 END SESSION
async function endSession() {
  const response = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: "END SESSION" })
  });

  const data = await response.json();

  addMessage("Feedback", data.reply);
}

// 🎯 ADD MESSAGE
function addMessage(sender, text) {
  const chat = document.getElementById("chat");

  const isUser = sender === "You";
  const isFeedback = sender === "Feedback";

  const bubble = document.createElement("div");

  if (isFeedback) {
    bubble.className = "p-4 rounded-2xl bg-white/90 backdrop-blur-md shadow-lg w-full text-sm";
    bubble.innerHTML = formatFeedback(text);
  } else {
    bubble.className = `px-4 py-2 rounded-2xl max-w-xs text-sm shadow-md ${
      isUser
        ? "bg-blue-500 text-white self-end ml-auto"
        : "bg-white/80 backdrop-blur text-black self-start mr-auto"
    }`;
    bubble.innerText = text;
  }

  chat.appendChild(bubble);
  chat.scrollTop = chat.scrollHeight;
}

// 🧾 FORMAT FEEDBACK
function formatFeedback(text) {
  return text
    .replace(/([A-Z ]+:)/g, "<h3 class='font-bold text-blue-600 mt-3'>$1</h3>")
    .replace(/- /g, "• ")
    .replace(/\n/g, "<br>");
}

</script>

</body>
</html>
